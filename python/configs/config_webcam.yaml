# ============================================================
#  Webcam / ESP32-CAM için Konfigürasyon
# ============================================================
#  Gerçek kamera kullanırken bu config'i seç. Sentetik dağılıma
#  fine-tune edilmiş model gerçek dünyayı (yüz, ten, ışık) yangın
#  sanabiliyor → orijinal model + HSV filtre kullanılır.
#
#  Kullanım:
#      python web_app.py --config configs/config_webcam.yaml --source webcam
#      ./run_demo.sh webcam   # zaten otomatik bunu seçer
# ============================================================

connection:
  stream_url: "http://192.168.1.25/stream"
  telemetry_url: "http://192.168.1.25/telemetry"
  esp32_base_url: "http://192.168.1.25"
  esp32_framesize: "vga"
  serial_port: ""
  baud_rate: 115200
  telemetry_interval: 0.8
  reconnect_delay: 2.0

mode:
  simulation: true
  webcam_index: 0
  sim_source: "webcam"
  sim_video_path: ""
  use_telemetry_heat: false
  use_structured_protocol: true

ai:
  model_path: "fire_model_roboflow.pt"
  conf_threshold: 0.25           # dengeli — model %66 conf veriyor
  iou_threshold: 0.45
  imgsz: 640
  inference_every_n: 1
  device: "auto"
  classes_of_interest: []        # boş → tüm sınıflar
  max_bbox_area_ratio: 0.6
  hsv_refine: false
  hsv_required: false
  smoke_priority_factor: 0.6
  validator_bypass_conf: 0.65    # sıkı — model çok eminse bypass (çakmak %66'da geçer; foto %20-40 conf bypass etmez)

robot:
  heat_threshold_c: 60.0
  speed_far: 200
  speed_medium: 160
  speed_close: 120
  scan_speed: 130
  area_medium: 3000
  area_close: 10000
  area_stop: 25000
  command_smoothing: 3
  fire_alert_enable: true

tracking:
  iou_match_threshold: 0.15
  max_missed_frames: 30
  min_consecutive_hits: 1
  stable_grace_frames: 10        # uzun grace — tek frame bile yakalanırsa görünür kalsın

fuzzy:
  sets:
    SMALL:  [0,      0,    2000,  3000]
    MEDIUM: [2000,   3000, 10000, 12000]
    LARGE:  [10000,  12000, 24000, 28000]
    HUGE:   [24000,  28000, 60000, 60000]
  outputs:
    SMALL: 0.15
    MEDIUM: 0.45
    LARGE: 0.78
    HUGE: 1.00

sa:
  t_start: 5000.0
  t_end: 1.0
  alpha: 0.995
  max_iter: 3000

output:
  dir: "kayitlar"
  video_codec: "XVID"
  video_fps: 20
  csv_log: true
  save_screenshots_on_lock: false

distance:
  ref_area_px: 8400
  ref_distance_m: 1.5
  use_vertical_bias: true
  bottom_close_factor: 0.75

heatmap:
  enabled: true
  decay: 0.88

notify:
  webhooks: []
  min_interval_sec: 30
  include_snapshot_b64: false
  timeout_sec: 3.0

sim:
  passthrough_detections: false   # gerçek kamerada anlamsız

# --- Multi-signal Yangın Doğrulayıcı ---
# YOLO bbox dönse bile bu 4 sinyal kontrol edilir:
#   - temporal varyans (statik foto 0)
#   - parlak çekirdek oranı (V>240)
#   - frame-fark motion (oynamayan = foto)
#   - alev rengi saturasyon profili (ten elenir)
# composite skor min_score altıysa tespit DÜŞER → false positive azalır.
# --- Küçük Alev Tespit (klasik CV — çakmak/mum için) ---
# YOLO küçük alevleri (50-300 px) sıkça atlar (training datasetinde nadir).
# Bu modül HSV bazlı: parlak çekirdek + karanlık çevre → çakmak gibi nesneler.
# validator ile birlikte çalışır — kırmızı duvar / ekran bu testten geçemez.
bright_flame_detector:
  enabled: false          # YOLO yetiyor, ihtiyaç yok
  min_area: 25
  max_area: 4000
  min_dark_ratio: 0.25
  fake_conf: 0.50

fire_validator:
  enabled: true
  history_size: 8
  min_score: 0.25
  # Ağırlıklar fire_validator.py içinde:
  #   bright_core=0.45  temporal=0.25  motion=0.20  saturation=0.10
  # bright_core = V>=245 piksel oranı (gerçek alevin beyaz çekirdeği)
  #   - Gerçek çakmak/video: 5-20% beyaz çekirdek → bright_core=1.0
  #   - Kırmızı foto:        V<240 → bright_core ≈ 0
  #   - Yüz/cilt:            sporadik highlight ama S<100 → bright_core düşük
  # Ağırlıklar (fire_validator.py içinde) temporal-ağır:
  #   temporal=0.55  motion=0.25  bright_core=0.15  saturation=0.05
  # Mixed model + validator kombinasyonu:
  #   - Çakmak/video: model görür + temporal/motion var → ACCEPT
  #   - Kırmızı foto: model görür ama temporal=motion=0 → REJECT (composite ≈ 0.04)
  #   - Yüz/cilt: model bazen görür, ama saturasyon profili düşük → REJECT
