# ============================================================
#  Yangın Tespit Robotu — Merkezi Konfigürasyon (v3.0.0)
# ============================================================
# pc_vision_controller.py bu dosyayı okur.
# Komut satırından --config flag'i ile farklı bir yaml verilebilir.
# ============================================================

# --- Bağlantı ---
connection:
  stream_url: "http://192.168.1.25/stream"
  telemetry_url: "http://192.168.1.25/telemetry"
  esp32_base_url: "http://192.168.1.25"   # /resolution, /settings için
  esp32_framesize: "vga"                  # qvga|vga|svga|xga|hd|sxga|uxga
  serial_port: ""             # Boş = otomatik
  baud_rate: 115200
  telemetry_interval: 0.8
  reconnect_delay: 2.0

# --- Modlar ---
mode:
  simulation: true            # true = webcam / sentetik sahne
  webcam_index: 0
  sim_source: "webcam"        # "webcam" | "synthetic" | "video"
  sim_video_path: ""          # sim_source=video ise dosya yolu
  use_telemetry_heat: false
  use_structured_protocol: true

# --- Yapay Zeka ---
ai:
  # v3.1.1: sentetik+gerçek mixed model varsayılan.
  # Eski real-only modele dönmek için: fire_model_v3_real.pt
  model_path: "fire_model_v311_mixed.pt"
  conf_threshold: 0.20        # sadece "fire" sınıfı aktif; boş sahne fire max=0.18 → 0.20 güvenli + çakmak tutması artar
  iou_threshold: 0.45
  imgsz: 1600                 # küçük/uzak çakmak alevi için yüksek çözünürlük şart (1280'de tutmadı)
  inference_every_n: 1        # her karede inference — tracking ve tepki için kritik
  device: "auto"              # "cuda" | "cpu" | "mps" | "auto" (M4 → mps)
  classes_of_interest: ["fire"]              # canlı çakmak hep "fire" verir; "default" ve "smoke" agresif gürültü — dışlandı
  max_bbox_area_ratio: 0.5    # bbox > frame'in %50'si ise duvar/oda yanıltıcısı say, ele
  # HSV refine/required: GERÇEK kamerada çakmak yansımalarını eler ama
  # sentetik sahnede modelin tespit ettiği alevi düşürebiliyor (palette farklı).
  # v3.1.1 mixed model sentetiği zaten yüksek confla görüyor → sim'de kapalı.
  hsv_refine: false           # bbox'ı HSV ile daralt (gerçek kamerada açmak istersen true)
  hsv_required: false         # HSV bulamazsa düşür (gerçek kamerada açmak istersen true)
  smoke_priority_factor: 0.6  # smoke skoru fire'a göre çarpan

# --- Robot Dinamikleri ---
robot:
  heat_threshold_c: 60.0
  speed_far: 200
  speed_medium: 160
  speed_close: 120
  scan_speed: 130
  area_medium: 3000
  area_close: 10000
  area_stop: 25000
  command_smoothing: 3        # son N karenin oy çokluğu
  fire_alert_enable: true     # stable-fire görüldüğünde Arduino'ya F gönder (LED/buzzer)

# --- Hedef Takibi (tracking) ---
tracking:
  iou_match_threshold: 0.20
  max_missed_frames: 15       # küçük titrek alev için generous, kısa bbox kaybolmasında track tutmaya devam
  min_consecutive_hits: 1     # sadece "fire" sınıfı aktif → false positive yok, anlık tetikleme güvenli
  stable_grace_frames: 3      # stable target bu kadar missed frame'de görünür kalır (FSM titremesini önler)

# --- Bulanık Mantık (alanı önceliğe çevirir) ---
fuzzy:
  sets:
    SMALL:  [0,      0,    2000,  3000]
    MEDIUM: [2000,   3000, 10000, 12000]
    LARGE:  [10000,  12000, 24000, 28000]
    HUGE:   [24000,  28000, 60000, 60000]
  outputs:
    SMALL: 0.15
    MEDIUM: 0.45
    LARGE: 0.78
    HUGE: 1.00

# --- Simulated Annealing ---
sa:
  t_start: 5000.0
  t_end: 1.0
  alpha: 0.995
  max_iter: 3000

# --- Çıktı ---
output:
  dir: "kayitlar"
  video_codec: "XVID"
  video_fps: 20
  csv_log: true
  save_screenshots_on_lock: false

# --- Mesafe Tahmini (mono-kamera kalibrasyonu) ---
# Bir referans yangın için bbox alanını ve gerçek mesafesini ölç,
# buraya yaz. Tahmin: D = D_ref * sqrt(A_ref / A).
distance:
  ref_area_px: 8400         # referans yangın bbox alanı (piksel²)
  ref_distance_m: 1.5       # o yangının kameradan uzaklığı (m)
  use_vertical_bias: true   # ekranın altındaki hedef daha yakın
  bottom_close_factor: 0.75

# --- Yangın Yoğunluk Isı Haritası ---
heatmap:
  enabled: true             # HUD üstüne ısı haritası overlay
  decay: 0.88               # her frame'de eski yoğunluk * decay (0..1)

# --- Webhook Bildirim (stable-fire kenarında POST) ---
# Listede URL yoksa modül no-op çalışır.
notify:
  webhooks: []              # ["https://hooks.example.com/oyts"]
  min_interval_sec: 30
  include_snapshot_b64: false
  timeout_sec: 3.0

# --- Sim mod ek bayrakları ---
sim:
  # v3.1.1: yeni model sentetiği gerçekten tespit ediyor → passthrough KAPALI.
  # Eğer eski real-only modele dönersen bunu tekrar true yap.
  passthrough_detections: false
