name: Build Windows EXE

# Tetikleyiciler:
#  - main'e push → otomatik build
#  - "Run workflow" tuşu → Actions sekmesinden manuel başlat
on:
  push:
    branches: [main]
    paths:
      - "build_windows/**"
      - "python/**"
      - "web/**"
      - ".github/workflows/build-windows-exe.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: python/requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # CPU-only torch — varsayılan CUDA paketi 2 GB+, runner diskini şişirir
      - name: Install PyTorch (CPU build)
        shell: cmd
        run: |
          python -m pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install project requirements
        shell: cmd
        run: |
          python -m pip install -r python\requirements.txt
          python -m pip install pyinstaller

      - name: Show installed versions
        shell: cmd
        run: |
          python --version
          python -m pip show pyinstaller torch ultralytics opencv-python | findstr /R "^Name ^Version"

      - name: Build Baslat.exe (PyInstaller)
        shell: cmd
        working-directory: build_windows
        run: |
          pyinstaller baslat.spec --noconfirm --log-level=WARN

      - name: List output
        shell: cmd
        working-directory: build_windows
        run: |
          dir dist\Baslat
          echo --- toplam boyut ---
          powershell -Command "(Get-ChildItem dist\Baslat -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB"

      # Klasör (Baslat.exe + DLL + model) — zip olarak iner
      - name: Upload Baslat folder artifact
        uses: actions/upload-artifact@v4
        with:
          name: Baslat-Windows-${{ github.sha }}
          path: build_windows/dist/Baslat/
          retention-days: 14
          compression-level: 6

      # ── Opsiyonel: Inno Setup ile tek-dosya installer ───────────────
      - name: Install Inno Setup
        shell: cmd
        run: |
          choco install innosetup -y --no-progress

      - name: Build installer (Inno Setup)
        shell: cmd
        working-directory: build_windows
        continue-on-error: true
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" oyts_setup.iss

      - name: Upload installer artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: OYTS-Setup-${{ github.sha }}
          path: build_windows/Output/*.exe
          retention-days: 14
          if-no-files-found: warn
